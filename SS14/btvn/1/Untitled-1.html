<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Manager</title>
</head>

<body>
<script>

let students = [
 {id:"S01",name:"Nguyen Van A",age:19,gpa:8.9,status:"active"},
 {id:"S02",name:"Tran Thi B",age:18,gpa:7.5,status:"active"},
 {id:"S03",name:"Le Van C",age:21,gpa:6.2,status:"active"},
 {id:"S04",name:"Pham Thi D",age:20,gpa:5.0,status:"inactive"},
 {id:"S05",name:"Hoang Van E",age:22,gpa:2.8,status:"active"}
];

function showStudents(){
 console.log("Danh sach sinh vien:");
 for(let i=0;i<students.length;i++){
  console.log(
   students[i].id,
   students[i].name,
   students[i].age,
   students[i].gpa,
   students[i].status
  );
 }
}

function createStudent(){

 let id = prompt("Nhap id");
 let name = prompt("Nhap ten");
 let age = Number(prompt("Nhap tuoi"));
 let gpa = Number(prompt("Nhap gpa"));
 let status = prompt("Nhap status");

 let st = {
  id:id,
  name:name,
  age:age,
  gpa:gpa,
  status:status
 };

 students.push(st);

 alert("Them thanh cong");
}

function updateStudent(){

 let id = prompt("Nhap id can sua");

 for(let i=0;i<students.length;i++){

  if(students[i].id == id){

   let name = prompt("Nhap ten moi");
   let age = prompt("Nhap tuoi moi");
   let gpa = prompt("Nhap gpa moi");
   let status = prompt("Nhap status moi");

   if(name!="") students[i].name = name;
   if(age!="") students[i].age = age;
   if(gpa!="") students[i].gpa = gpa;
   if(status!="") students[i].status = status;

   alert("Cap nhat thanh cong");
   return;
  }

 }

 alert("Khong tim thay sinh vien");
}

function deleteStudent(){

 let id = prompt("Nhap id can xoa");

 for(let i=0;i<students.length;i++){

  if(students[i].id == id){

   students[i].status = "inactive";

   alert("Da soft delete");
   return;
  }

 }

 alert("Khong tim thay");
}

function analytics(){

 let total = students.length;
 let active = 0;
 let inactive = 0;
 let sum = 0;

 for(let i=0;i<students.length;i++){

  sum += students[i].gpa;

  if(students[i].status == "active"){
   active++;
  }else{
   inactive++;
  }

 }

 let avg = sum/total;

 console.log("Tong sinh vien:",total);
 console.log("Active:",active);
 console.log("Inactive:",inactive);
 console.log("GPA trung binh:",avg);
}

function menu(){

 let choice;

 do{

 choice = prompt(
`
1. Them sinh vien
2. Cap nhat
3. Soft delete
4. Xem danh sach
5. Thong ke
0. Thoat
`);

 switch(choice){

  case "1":
   createStudent();
   break;

  case "2":
   updateStudent();
   break;

  case "3":
   deleteStudent();
   break;

  case "4":
   showStudents();
   break;

  case "5":
   analytics();
   break;

 }

 }while(choice!="0");

}

menu();

</script>
</body>
</html>
